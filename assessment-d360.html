<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D360° Assessment — AlignData</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0F1E38;
  --navy-mid: #162236;
  --navy-light: #1e2f4a;
  --teal: #00B894;
  --teal-dark: #008f74;
  --blue: #2563EB;
  --border: rgba(255,255,255,0.08);
  --text: rgba(255,255,255,0.9);
  --muted: rgba(255,255,255,0.45);
  --danger: #e74c3c;
  --warn: #f39c12;
  --success: #00B894;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--navy);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.shell { width: 100%; max-width: 720px; }
.progress-wrap { margin-bottom: 32px; }
.progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 12px; color: var(--muted); }
.progress-track { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--teal)); border-radius: 2px; transition: width 0.4s cubic-bezier(0.22,1,0.36,1); }
.dim-label { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--teal); margin-bottom: 12px; }
.dim-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); }
.card { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 16px; padding: 36px; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--blue), var(--teal)); }
.q-num { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.q-text { font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1.35; color: #fff; margin-bottom: 8px; }
.q-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
.opt { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; cursor: pointer; transition: all 0.18s; }
.opt:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); }
.opt.selected { background: rgba(0,184,148,0.1); border-color: rgba(0,184,148,0.4); }
.opt-circle { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.25); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.18s; }
.opt.selected .opt-circle { background: var(--teal); border-color: var(--teal); }
.opt-check { width: 8px; height: 8px; border-radius: 50%; background: #fff; display: none; }
.opt.selected .opt-check { display: block; }
.opt-label { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.opt-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
.opt.selected .opt-label { color: var(--teal); }
.nav { display: flex; justify-content: space-between; align-items: center; }
.btn-back { background: transparent; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: var(--muted); font-size: 13px; padding: 10px 20px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.btn-back:hover { color: #fff; border-color: rgba(255,255,255,0.25); }
.btn-next { background: linear-gradient(135deg, var(--blue), var(--teal)); border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 500; padding: 12px 28px; cursor: pointer; transition: opacity 0.15s, transform 0.15s; font-family: 'DM Sans', sans-serif; opacity: 0.4; pointer-events: none; }
.btn-next.active { opacity: 1; pointer-events: all; }
.btn-next.active:hover { transform: translateY(-1px); opacity: 0.9; }
.intro { text-align: center; padding: 48px 36px; }
.intro-badge { display: inline-flex; align-items: center; gap: 7px; background: rgba(0,184,148,0.1); border: 1px solid rgba(0,184,148,0.3); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600; color: var(--teal); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }
.intro h1 { font-family: 'DM Serif Display', serif; font-size: 36px; line-height: 1.2; color: #fff; margin-bottom: 16px; }
.intro h1 em { color: var(--teal); font-style: italic; }
.intro p { font-size: 15px; color: var(--muted); line-height: 1.7; max-width: 480px; margin: 0 auto 32px; }
.intro-meta { display: flex; justify-content: center; gap: 24px; margin-bottom: 32px; }
.intro-meta-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.intro-meta-num { font-size: 24px; font-weight: 600; color: #fff; }
.intro-meta-lbl { font-size: 11px; color: var(--muted); }
.btn-start { background: linear-gradient(135deg, var(--blue), var(--teal)); border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 500; padding: 14px 40px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: transform 0.15s, opacity 0.15s; }
.btn-start:hover { transform: translateY(-2px); opacity: 0.9; }
.result { padding: 36px; }
.result-header { text-align: center; margin-bottom: 32px; }
.score-ring { width: 120px; height: 120px; margin: 0 auto 16px; position: relative; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 8; }
.score-ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.22,1,0.36,1); }
.score-num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-val { font-size: 28px; font-weight: 600; color: #fff; line-height: 1; }
.score-max { font-size: 11px; color: var(--muted); }
.result-level { font-family: 'DM Serif Display', serif; font-size: 22px; color: #fff; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--muted); }
.dim-bars { margin-bottom: 28px; }
.dim-bar-item { margin-bottom: 14px; }
.dim-bar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 13px; }
.dim-bar-name { color: var(--text); font-weight: 500; }
.dim-bar-score { color: var(--muted); font-size: 12px; }
.dim-bar-track { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.dim-bar-fill { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(0.22,1,0.36,1); }

/* ── Brechas ── */
.recos { margin-bottom: 28px; }
.reco-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.reco-count-badge { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: 20px; color: #EF4444; font-size: 11px; font-weight: 600; padding: 2px 10px; letter-spacing: 0; text-transform: none; }

/* Brecha visible */
.reco-item { display: flex; gap: 14px; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; margin-bottom: 8px; font-size: 13px; line-height: 1.55; color: rgba(255,255,255,0.8); align-items: flex-start; }
.reco-icon-wrap { width: 38px; height: 38px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.reco-icon-wrap svg { width: 20px; height: 20px; }

/* Brecha nublada */
.reco-blurred-wrap { position: relative; margin-bottom: 8px; border-radius: 10px; overflow: hidden; }
.reco-blurred { display: flex; gap: 14px; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; font-size: 13px; line-height: 1.55; color: rgba(255,255,255,0.8); filter: blur(5px); user-select: none; pointer-events: none; align-items: flex-start; }
.reco-blurred-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(15,30,56,0.55), rgba(22,34,54,0.7)); display: flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); }
.reco-lock-icon { font-size: 13px; color: rgba(255,255,255,0.3); }

/* Blur wall CTA */
.blur-wall-cta { margin-top: 4px; margin-bottom: 4px; padding: 16px 18px; background: linear-gradient(135deg, rgba(37,99,235,0.12), rgba(0,184,148,0.08)); border: 1px solid rgba(37,99,235,0.25); border-radius: 10px; display: flex; align-items: center; gap: 14px; }
.blur-wall-cta-icon { font-size: 22px; flex-shrink: 0; }
.blur-wall-cta-title { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 2px; }
.blur-wall-cta-sub { font-size: 12px; color: var(--muted); line-height: 1.45; }

/* Lead form */
.lead-form { background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.25); border-radius: 12px; padding: 24px; }
.lead-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: #fff; margin-bottom: 6px; }
.lead-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
.lead-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.field-wrap { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.field-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; color: #fff; font-size: 13px; padding: 9px 12px; outline: none; font-family: 'DM Sans', sans-serif; transition: border-color 0.15s; }
.field-input:focus { border-color: var(--teal); }
.field-input::placeholder { color: rgba(255,255,255,0.25); }
.btn-lead { width: 100%; background: linear-gradient(135deg, var(--blue), var(--teal)); border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 500; padding: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 10px; transition: opacity 0.15s; }
.btn-lead:hover { opacity: 0.9; }
.lead-privacy { font-size: 11px; color: rgba(255,255,255,0.2); text-align: center; margin-top: 8px; }
.sent-state { text-align: center; padding: 20px 0; }
.sent-icon { font-size: 36px; margin-bottom: 10px; }
.sent-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: #fff; margin-bottom: 6px; }
.sent-sub { font-size: 13px; color: var(--muted); }
.fade-in-r { animation: fadeInR 0.3s ease both; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeInR { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
@media (max-width: 600px) {
  .card { padding: 24px 20px; }
  .q-text { font-size: 18px; }
  .intro h1 { font-size: 26px; }
  .lead-fields { grid-template-columns: 1fr; }
  .blur-wall-cta { flex-direction: column; gap: 8px; text-align: center; }
}
</style>

  risk: `<svg viewBox="0 0 24 24" fill="none">
    <path d="M12 2.25L3.75 6.75v4.5c0 5.25 3.6 10.15 8.25 11.25 4.65-1.1 8.25-6 8.25-11.25v-4.5L12 2.25z" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M12 2.25L3.75 6.75v4.5c0 5.25 3.6 10.15 8.25 11.25" stroke="#EF4444" stroke-width="1.5" stroke-linejoin="round" fill="none" opacity="0.35"/>
    <path d="M12 8v4M12 14.5v.5" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  </svg>`,
  // Genéricas
  contrato: `<svg viewBox="0 0 24 24" fill="none">
    <path d="M3.375 19.5h13.5A1.875 1.875 0 0018.75 17.625V8.25L13.5 2.25H5.25A1.875 1.875 0 003.375 4.125v15.375z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`,
  capacitacion: `<svg viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="7.5" r="3.75" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <path d="M15.75 7.5a3.75 3.75 0 11-7.5 0" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" fill="none"/>
    <path d="M3 19.5a9 9 0 1118 0" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <path d="M19.5 14.25a6.75 6.75 0 00-13.5 0" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  </svg>`,
  dpia: `<svg viewBox="0 0 24 24" fill="none">
    <circle cx="11" cy="11" r="7.25" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <circle cx="11" cy="11" r="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <path d="M16.5 16.5L21 21" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
  </svg>`,
  protocolo: `<svg viewBox="0 0 24 24" fill="none">
    <path d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.311 6.022c1.733.64 3.56 1.085 5.455 1.31" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M14.857 17.082a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <path d="M6 9v.75a8.967 8.967 0 01-1.5 5" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`,
};

// Colores de fondo del ícono por dimensión
const ICON_BG = {
  gov:  'rgba(37,99,235,0.12)',
  data: 'rgba(139,92,246,0.12)',
  arco: 'rgba(0,184,148,0.12)',
  sec:  'rgba(245,158,11,0.12)',
  risk: 'rgba(239,68,68,0.12)',
};
const ICON_BORDER = {
  gov:  'rgba(37,99,235,0.25)',
  data: 'rgba(139,92,246,0.25)',
  arco: 'rgba(0,184,148,0.25)',
  sec:  'rgba(245,158,11,0.25)',
  risk: 'rgba(239,68,68,0.25)',
};

const RECOS = {
  gov:  { iconKey:'gov',  text:'Formalizar una política de protección de datos aprobada por la dirección y designar un DPO o encargado de privacidad con atribuciones claras.' },
  data: { iconKey:'data', text:'Elaborar un registro de actividades de tratamiento (RAT) con los datos que recopilan, su finalidad y plazos de retención. Publicar aviso de privacidad conforme a la Ley 21.719.' },
  arco: { iconKey:'arco', text:'Implementar un canal formal para que sus clientes ejerzan sus derechos ARCOP (Acceso, Rectificación, Cancelación, Oposición, Portabilidad) dentro del plazo legal de 15 días hábiles.' },
  sec:  { iconKey:'sec',  text:'Implementar cifrado de datos sensibles, control de accesos por roles y un plan de respuesta ante brechas con notificación a la APDP.' },
  risk: { iconKey:'risk', text:'Capacitar al equipo en los requerimientos de la Ley 21.719 e iniciar un plan de adecuación con acciones concretas antes de diciembre 2026.' },
};

const RECOS_GENERICAS = [
  { iconKey:'contrato',     text:'Revisar y actualizar los contratos con proveedores y subprocesadores para incluir cláusulas de protección de datos conforme a la Ley 21.719.' },
  { iconKey:'capacitacion', text:'Implementar un programa de capacitación continua para todo el personal que tenga acceso a datos personales.' },
  { iconKey:'dpia',         text:'Realizar una Evaluación de Impacto en la Protección de Datos (DPIA) para los tratamientos de mayor riesgo.' },
  { iconKey:'protocolo',    text:'Establecer un protocolo de respuesta ante brechas de seguridad con plazos de notificación a la APDP conforme a la ley.' },
];

let current = -1;
let answers = new Array(8).fill(null);

function getScore() {
  const total = answers.reduce((s, v) => s + (v !== null ? v : 0), 0);
  return Math.round((total / 24) * 100);
}
function getDimScore(dimIdx) {
  const qs = DIMS[dimIdx].questions;
  const total = qs.reduce((s, qi) => s + (answers[qi] !== null ? answers[qi] : 0), 0);
  return Math.round((total / (qs.length * 3)) * 100);
}
function getLevel(score) {
  return LEVELS.find(l => score >= l.min && score <= l.max) || LEVELS[0];
}
function getAllWeakDims() {
  return DIMS.map((d, i) => ({ ...d, score: getDimScore(i) }))
             .filter(d => d.score < 80)
             .sort((a, b) => a.score - b.score);
}

function iconHtml(key, dimId) {
  const bg = ICON_BG[dimId] || 'rgba(255,255,255,0.05)';
  const border = ICON_BORDER[dimId] || 'rgba(255,255,255,0.1)';
  return `<div class="reco-icon-wrap" style="background:${bg};border:1px solid ${border}">${ICONS[key]}</div>`;
}

function renderIntro() {
  const card = document.getElementById('mainCard');
  document.getElementById('progressWrap').style.display = 'none';
  card.innerHTML = `
    <div class="intro">
      <div class="intro-badge"><span style="width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block"></span>D360° Assessment · Ley 21.719</div>
      <h1>¿Está su empresa<br>preparada para la <em>Ley 21.719?</em></h1>
      <p>Responda 8 preguntas y obtenga en 3 minutos su nivel de madurez en protección de datos personales, con recomendaciones concretas.</p>
      <div class="intro-meta">
        <div class="intro-meta-item"><div class="intro-meta-num">8</div><div class="intro-meta-lbl">Preguntas</div></div>
        <div class="intro-meta-item"><div class="intro-meta-num">5</div><div class="intro-meta-lbl">Dimensiones</div></div>
        <div class="intro-meta-item"><div class="intro-meta-num">~5'</div><div class="intro-meta-lbl">Minutos</div></div>
      </div>
      <button class="btn-start" onclick="startAssessment()">Iniciar diagnóstico →</button>
    </div>`;
}

function startAssessment() { current = 0; renderQuestion(); }

function renderQuestion() {
  const q = QUESTIONS[current];
  const dim = DIMS.find(d => d.id === q.dim);
  const card = document.getElementById('mainCard');
  const pct = Math.round((current / 8) * 100);
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressLabel').textContent = `Pregunta ${current+1} de 8`;
  document.getElementById('dimName').textContent = dim.name;
  document.getElementById('progressFill').style.width = pct + '%';
  const sel = answers[current];
  card.innerHTML = `
    <div class="fade-in-r">
      <div class="dim-label"><span class="dim-dot" style="background:${dim.color}"></span>${dim.name}</div>
      <div class="q-num">Pregunta ${current+1} de 8</div>
      <div class="q-text">${q.q}</div>
      <div class="q-sub">${q.sub}</div>
      <div class="options">
        ${q.opts.map(o => `
          <div class="opt ${sel === o.v ? 'selected' : ''}" onclick="selectOpt(${o.v})">
            <div class="opt-circle"><div class="opt-check"></div></div>
            <div class="opt-content">
              <div class="opt-label">${o.l}</div>
              <div class="opt-desc">${o.d}</div>
            </div>
          </div>`).join('')}
      </div>
      <div class="nav">
        <button class="btn-back" onclick="goBack()" ${current === 0 ? 'style="visibility:hidden"' : ''}>← Anterior</button>
        <button class="btn-next ${sel !== null ? 'active' : ''}" id="btnNext" onclick="goNext()">
          ${current === 7 ? 'Ver resultados →' : 'Siguiente →'}
        </button>
      </div>
    </div>`;
}

function selectOpt(val) {
  answers[current] = val;
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('btnNext').classList.add('active');
}
function goNext() {
  if (answers[current] === null) return;
  if (current < 7) { current++; renderQuestion(); } else { renderResults(); }
}
function goBack() {
  if (current > 0) { current--; renderQuestion(); }
}

function renderResults() {
  const score = getScore();
  const level = getLevel(score);
  const weakDims = getAllWeakDims();
  document.getElementById('progressWrap').style.display = 'none';
  const card = document.getElementById('mainCard');

  const dimBars = DIMS.map((d, i) => {
    const s = getDimScore(i);
    let color = d.color;
    if (s < 33) color = '#EF4444';
    else if (s < 66) color = '#F59E0B';
    return `
      <div class="dim-bar-item">
        <div class="dim-bar-top">
          <span class="dim-bar-name">${d.name}</span>
          <span class="dim-bar-score">${s}%</span>
        </div>
        <div class="dim-bar-track">
          <div class="dim-bar-fill" style="width:0%;background:${color}" data-width="${s}%"></div>
        </div>
      </div>`;
  }).join('');

  // Pool de 6 brechas: reales primero, luego genéricas
  const realesPool = weakDims.map(d => ({ iconKey: RECOS[d.id].iconKey, dimId: d.id, text: RECOS[d.id].text }));
  const pool = [...realesPool];
  let gi = 0;
  while (pool.length < 6 && gi < RECOS_GENERICAS.length) {
    pool.push({ ...RECOS_GENERICAS[gi], dimId: null });
    gi++;
  }

  // 2 visibles + 4 nubladas
  const visibles = pool.slice(0, 2);
  const totalBrechas = pool.length;

  const blurTexts = [
    { iconKey:'contrato',     dimId:null, text:'Revisar los contratos con terceros proveedores que acceden a datos personales e incluir cláusulas específicas de tratamiento y responsabilidad.' },
    { iconKey:'sec',          dimId:'sec', text:'Implementar controles técnicos adicionales de acceso y auditoría sobre los sistemas que almacenan información sensible de clientes y empleados.' },
    { iconKey:'dpia',         dimId:null, text:'Actualizar los registros de actividades de tratamiento e incorporar los nuevos flujos de datos identificados en el último período de operación.' },
    { iconKey:'protocolo',    dimId:null, text:'Establecer métricas de cumplimiento e indicadores clave para el monitoreo continuo del programa de privacidad ante posibles fiscalizaciones.' },
  ];

  const visiblesHtml = visibles.map(b => `
    <div class="reco-item">
      ${iconHtml(b.iconKey, b.dimId)}
      <span>${b.text}</span>
    </div>`).join('');

  const nubladasHtml = blurTexts.map(b => `
    <div class="reco-blurred-wrap">
      <div class="reco-blurred">
        ${iconHtml(b.iconKey, b.dimId)}
        <span>${b.text}</span>
      </div>
      <div class="reco-blurred-overlay">
        <span class="reco-lock-icon">🔒 Bloqueado</span>
      </div>
    </div>`).join('');

  const circumference = 2 * Math.PI * 46;
  const offset = circumference - (score / 100) * circumference;

  card.innerHTML = `
    <div class="result fade-in-r">
      <div class="result-header">
        <div class="score-ring">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle class="score-ring-bg" cx="60" cy="60" r="46"/>
            <circle class="score-ring-fill" cx="60" cy="60" r="46"
              stroke="${level.color}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${circumference}"
              id="ringFill"/>
          </svg>
          <div class="score-num">
            <div class="score-val" id="scoreVal">0</div>
            <div class="score-max">/ 100</div>
          </div>
        </div>
        <div class="result-level">${level.name}</div>
        <div class="result-sub">${level.desc}</div>
      </div>

      <div class="dim-bars">${dimBars}</div>

      <div class="recos">
        <div class="reco-title">
          Brechas detectadas
          <span class="reco-count-badge">${totalBrechas} brechas identificadas</span>
        </div>
        ${visiblesHtml}
        ${nubladasHtml}
        <div class="blur-wall-cta">
          <div class="blur-wall-cta-icon">🔍</div>
          <div>
            <div class="blur-wall-cta-title">4 brechas adicionales bloqueadas</div>
            <div class="blur-wall-cta-sub">El diagnóstico completo D360° incluye el análisis detallado de todas las brechas, plan de acción priorizado y acompañamiento de nuestro equipo.</div>
          </div>
        </div>
      </div>

      <div class="lead-form" id="leadForm">
        <div class="lead-title">Ver el análisis completo</div>
        <div class="lead-sub">Desbloquee todas las brechas detectadas y reciba un plan de acción personalizado para cumplir con la Ley 21.719 antes de diciembre 2026.</div>
        <div class="lead-fields">
          <div class="field-wrap"><label class="field-label">Nombre</label><input class="field-input" type="text" id="fName" placeholder="Juan Pérez"></div>
          <div class="field-wrap"><label class="field-label">Empresa</label><input class="field-input" type="text" id="fCompany" placeholder="Mi Empresa Ltda."></div>
        </div>
        <div class="lead-fields">
          <div class="field-wrap"><label class="field-label">Correo</label><input class="field-input" type="email" id="fEmail" placeholder="juan@empresa.cl"></div>
          <div class="field-wrap"><label class="field-label">Teléfono (opcional)</label><input class="field-input" type="tel" id="fPhone" placeholder="+56 9 1234 5678"></div>
        </div>
        <button class="btn-lead" onclick="submitLead()">Solicitar diagnóstico completo D360° →</button>
        <div class="lead-privacy">Sus datos se tratan conforme a la Ley 21.719 · Solo para contacto de AlignData</div>
      </div>
    </div>`;

  setTimeout(() => {
    document.getElementById('ringFill').style.strokeDashoffset = offset;
    let n = 0;
    const interval = setInterval(() => {
      n = Math.min(n + 2, score);
      document.getElementById('scoreVal').textContent = n;
      if (n >= score) clearInterval(interval);
    }, 20);
    document.querySelectorAll('.dim-bar-fill').forEach(b => {
      setTimeout(() => { b.style.width = b.dataset.width; }, 200);
    });
  }, 100);
}

const AD_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNOzQGLmC15Bv1p7EZhKKichnybe3V0PCRzjdfjBdgBKGezqpfPKlesFaXADNgXqCbbQ/exec';

function submitLead() {
  const name    = document.getElementById('fName').value.trim();
  const company = document.getElementById('fCompany').value.trim();
  const email   = document.getElementById('fEmail').value.trim();
  const phone   = document.getElementById('fPhone').value.trim();
  if (!name || !email) {
    document.getElementById('fName').style.borderColor  = !name  ? '#EF4444' : '';
    document.getElementById('fEmail').style.borderColor = !email ? '#EF4444' : '';
    return;
  }
  document.getElementById('leadForm').innerHTML = `
    <div class="sent-state">
      <div style="width:44px;height:44px;border:3px solid rgba(255,255,255,0.15);border-top-color:#00B894;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
      <div class="sent-sub" style="color:rgba(255,255,255,0.5);">Guardando sus resultados...</div>
    </div>`;
  const datos = {
    tipo:'assessment', nombre:name, empresa:company, correo:email, telefono:phone,
    score:getScore(), dims:DIMS.map((d,i)=>getDimScore(i)), respuestas:answers.slice()
  };
  fetch(AD_SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(datos) })
    .then(() => {
      document.getElementById('leadForm').innerHTML = `
        <div class="sent-state">
          <div class="sent-icon">✅</div>
          <div class="sent-title">¡Solicitud enviada!</div>
          <div class="sent-sub">Un experto AlignData se contactará en menos de 24 horas hábiles para agendar su diagnóstico completo D360°.</div>
        </div>`;
    })
    .catch(() => {
      document.getElementById('leadForm').innerHTML = `
        <div class="sent-state">
          <div class="sent-icon">✅</div>
          <div class="sent-title">¡Solicitud enviada!</div>
          <div class="sent-sub">Un experto AlignData se contactará en menos de 24 horas hábiles.</div>
        </div>`;
    });
}

renderIntro();
</script>
